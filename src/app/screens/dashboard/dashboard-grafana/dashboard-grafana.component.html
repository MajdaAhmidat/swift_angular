<app-topbar
  pageTitle="Centre de Monitoring SWIFT"
  breadcrumb="Accueil › Supervision des virements">
</app-topbar>

<div class="page-body grafana-embed">
  <section class="bmce-card dashboard-filter-card">
    <div class="bmce-card__header">
      <div class="bmce-card__title">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>
        Filtres de supervision
      </div>
    </div>
    <div class="bmce-card__body grafana-embed__filters">
      <div class="filters-row filters-row--main">
        <div class="filter-field">
          <label for="sop-select">SOP</label>
          <select
            id="sop-select"
            [(ngModel)]="selectedSopId"
            (ngModelChange)="onSopChange($event)"
            class="filter-input">
            <option *ngFor="let sop of sops" [value]="sop.id">
              {{ sop.libelleSop }} (ID: {{ sop.id }})
            </option>
          </select>
        </div>
        <div class="filter-field">
          <label for="date-from-input">Date début</label>
          <input
            id="date-from-input"
            type="date"
            [(ngModel)]="selectedDateFrom"
            (ngModelChange)="onDateRangeChange()"
            class="filter-input filter-input--date filter-input--date-pro" />
        </div>

        <div class="filter-field">
          <label for="date-to-input">Date fin</label>
          <input
            id="date-to-input"
            type="date"
            [(ngModel)]="selectedDateTo"
            (ngModelChange)="onDateRangeChange()"
            class="filter-input filter-input--date filter-input--date-pro" />
        </div>
      </div>

      <div class="section-divider">Filtres rapides</div>
      <div class="pacs-switch-row">
        <div class="dir-toggle pacs-switch message-switch">
          <button
            type="button"
            class="dir-btn"
            [class.dir-btn--active]="selectedMessageType === '__all'"
            (click)="onMessageTypeChange('__all')">
            <span class="pacs-switch__icon">≡</span>
            Tous messages
          </button>
          <button
            type="button"
            class="dir-btn"
            [class.dir-btn--active]="selectedMessageType === 'Emis ACK'"
            (click)="onMessageTypeChange('Emis ACK')">
            <span class="pacs-switch__icon">✓</span>
            EMIS ACK
          </button>
          <button
            type="button"
            class="dir-btn"
            [class.dir-btn--active]="selectedMessageType === 'Emis NACK'"
            (click)="onMessageTypeChange('Emis NACK')">
            <span class="pacs-switch__icon">!</span>
            EMIS NACK
          </button>
          <button
            type="button"
            class="dir-btn"
            [class.dir-btn--active]="selectedMessageType === 'Recu Rapproche'"
            (click)="onMessageTypeChange('Recu Rapproche')">
            <span class="pacs-switch__icon">↓</span>
            RECU rapproché
          </button>
          <button
            type="button"
            class="dir-btn"
            [class.dir-btn--active]="selectedMessageType === 'Recu Non rapproche'"
            (click)="onMessageTypeChange('Recu Non rapproche')">
            <span class="pacs-switch__icon">!</span>
            RECU non rapproché
          </button>
        </div>
        <div class="toggle-divider"></div>
        <div class="dir-toggle pacs-switch pacs-switch--right">
          <button
            type="button"
            class="dir-btn"
            [class.dir-btn--active]="selectedPacsType === '__all'"
            (click)="onPacsTypeChange('__all')">
            <span class="pacs-switch__icon">≡</span>
            Tous
          </button>
          <button
            type="button"
            class="dir-btn"
            [class.dir-btn--active]="selectedPacsType === 'pacs.008.001.08'"
            (click)="onPacsTypeChange('pacs.008.001.08')">
            <span class="pacs-switch__icon">→</span>
            PACS.008
          </button>
          <button
            type="button"
            class="dir-btn"
            [class.dir-btn--active]="selectedPacsType === 'pacs.009.001.08'"
            (click)="onPacsTypeChange('pacs.009.001.08')">
            <span class="pacs-switch__icon">←</span>
            PACS.009
          </button>
        </div>
      </div>
    </div>
  </section>

  <div class="feedback feedback--loading" *ngIf="loading">
    Chargement des SOP en cours...
  </div>
  <div class="feedback feedback--error" *ngIf="error">
    {{ error }}
  </div>

  <!-- Affiche plusieurs panels via ngFor -->
  <div class="grafana-container" *ngIf="selectedSopId">
    <div class="grafana-panel" *ngFor="let p of panels">
      <iframe
        class="grafana-embed__iframe"
        [src]="getPanelUrl(p.id) | safeResourceUrl"
        title="Graphes SOP"
        frameborder="0"
        loading="lazy">
      </iframe>
      <div class="panel-top-mask" aria-hidden="true"></div>
    </div>
  </div>

  <div class="select-placeholder" *ngIf="!selectedSopId">
    <div class="placeholder-content">
      <i class="info-icon">i</i>
      <p>Aucun SOP sélectionné. Choisissez un SOP pour afficher les indicateurs de supervision.</p>
    </div>
  </div>
</div>
