<app-topbar
  pageTitle="Modifier un utilisateur"
  breadcrumb="Accueil › Administration › Modifier"
  primaryLabel="Enregistrer les modifications">
</app-topbar>

<div class="page-body stagger">
  <div class="gap-row">

    <!-- Formulaire modification -->
    <div class="bmce-card flex-2">
      <div class="bmce-card__header">
        <div class="bmce-card__title">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="var(--bmce-navy)" stroke-width="2">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Modifier les informations
        </div>
        <span class="badge badge--green">Compte actif</span>
      </div>
      <div class="bmce-card__body">

        <div class="section-divider">Identité</div>
        <div class="form-grid form-grid--2" style="margin-bottom:14px;">
          <div class="form-group">
            <label class="form-label">Prénom</label>
            <input type="text" class="form-control" [(ngModel)]="user.prenom">
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input type="text" class="form-control" [(ngModel)]="user.nom">
          </div>
          <div class="form-group">
            <label class="form-label">Email professionnel</label>
            <input type="email" class="form-control" [(ngModel)]="user.email">
          </div>
          <div class="form-group">
            <label class="form-label">Téléphone</label>
            <input type="tel" class="form-control" [(ngModel)]="user.telephone">
          </div>
        </div>

        <div class="section-divider">Poste & Accès</div>
        <div class="form-grid form-grid--2" style="margin-bottom:14px;">
          <div class="form-group">
            <label class="form-label">Département</label>
            <select class="form-control" [(ngModel)]="user.departement">
              <option *ngFor="let d of departements" [value]="d">{{ d }}</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Poste</label>
            <input type="text" class="form-control" [(ngModel)]="user.poste">
          </div>
          <div class="form-group">
            <label class="form-label">Profil</label>
            <select class="form-control" [(ngModel)]="user.profil">
              <option value="lecteur">Lecteur</option>
              <option value="operateur">Opérateur</option>
              <option value="superviseur">Superviseur</option>
              <option value="administrateur">Administrateur</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Statut du compte</label>
            <select class="form-control" [(ngModel)]="user.statut">
              <option value="actif">Actif</option>
              <option value="inactif">Inactif</option>
              <option value="suspendu">Suspendu</option>
            </select>
          </div>
        </div>

      </div>
      <div class="bmce-card__footer">
        <button class="btn btn--danger" style="margin-right:auto;">Désactiver le compte</button>
        <button class="btn btn--ghost" routerLink="/administration/rechercher">Annuler</button>
        <button class="btn btn--primary">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
          Enregistrer
        </button>
      </div>
    </div>

    <!-- Sidebar info + activité -->
    <div class="flex-1" style="display:flex;flex-direction:column;gap:16px;">

      <!-- Carte utilisateur -->
      <div class="bmce-card">
        <div class="bmce-card__body">
          <div style="text-align:center;padding:16px 0 12px;">
            <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--bmce-navy),var(--bmce-teal));display:flex;align-items:center;justify-content:center;margin:0 auto 10px;color:white;font-family:'Sora',sans-serif;font-size:18px;font-weight:700;">
              {{ initiales }}
            </div>
            <div style="font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:var(--bmce-navy);">{{ user.prenom }} {{ user.nom }}</div>
            <div style="font-size:12px;color:var(--gray-400);">{{ user.poste }}</div>
          </div>
        </div>
      </div>

      <!-- Journal activité -->
      <div class="bmce-card">
        <div class="bmce-card__header">
          <div class="bmce-card__title">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="var(--bmce-navy)" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M12 6v6l3 3"/>
            </svg>
            Activité récente
          </div>
        </div>
        <div class="bmce-card__body">
          <div class="timeline">
            <div *ngFor="let a of activite" class="tl-item">
              <div class="tl-dot tl-dot--done">
                <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="var(--success)" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
              </div>
              <div class="tl-content">
                <div class="tl-title">{{ a.action }}</div>
                <div class="tl-date">{{ a.date }}</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
