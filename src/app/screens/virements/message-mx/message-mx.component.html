<app-topbar
  pageTitle="Messages MX ISO 20022"
  breadcrumb="Accueil › Virements › Messages MX"
  secondaryLabel="XML brut">
</app-topbar>

<div class="page-body stagger">

  <!-- Header virement -->
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
    <button class="btn btn--ghost btn--sm" [routerLink]="['/virements/consulter', virementId]" [queryParams]="{ direction: direction }">← Retour au virement</button>
    <div>
      <div style="font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--bmce-navy);">Virement #{{ virementId }}</div>
      <div style="font-size:11px;color:var(--gray-400);">Message MX archive depuis la base de donnees</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <span class="badge badge--green" *ngIf="xmlContent">Message trouve</span>
      <span class="badge badge--red" *ngIf="!xmlContent && !loading">Aucun message</span>
      <span class="badge badge--navy" *ngIf="sourceLabel">Source {{ sourceLabel }}</span>
    </div>
  </div>

  <div class="bmce-card">
    <div class="bmce-card__body">
      <div *ngIf="loading" style="padding:16px 0;color:var(--gray-400);font-weight:600;">
        Chargement du message MX...
      </div>

      <div *ngIf="error" style="padding:12px;border:1px solid #fecaca;background:#fef2f2;color:#b91c1c;border-radius:8px;margin-bottom:12px;">
        {{ error }}
      </div>

      <div style="margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;" *ngIf="xmlContent">
        <span style="font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;">Contenu XML</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn--ghost btn--sm" (click)="copyXml()">Copier</button>
        </div>
      </div>

      <pre class="mx-box" *ngIf="xmlContent">{{ xmlContent }}</pre>
    </div>
  </div>

</div>
