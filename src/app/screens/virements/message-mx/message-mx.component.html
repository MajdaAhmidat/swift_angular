<div class="page-body stagger">
  <div class="mx-menu-fixed">
    <app-topbar pageTitle="Messages MX ISO 20022" breadcrumb="Accueil › Virements › Messages MX"></app-topbar>

    <div class="mx-top-row">
      <button class="btn btn--back vir-back-btn" [routerLink]="['/virements/consulter', virementId]" [queryParams]="{ direction: direction }">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
        Retour
      </button>
      <div class="mx-header-actions">
        <span class="badge badge--navy">Virement #{{ virementId }}</span>
        <span class="badge badge--green">{{ direction === 'recus' ? 'RECU' : 'EMIS' }}</span>
      </div>
    </div>
  </div>

  <div class="bmce-card mx-content-card">
    <div class="bmce-card__body mx-content-card__body">
      <div *ngIf="loading" class="mx-feedback">Chargement du message...</div>
      <div *ngIf="error" class="mx-feedback mx-feedback--error">{{ error }}</div>

      <div class="mx-meta" *ngIf="!loading && !error">
        <div class="mx-meta__row">
          <span class="mx-meta__label">Nom du fichier</span>
          <span class="mx-meta__value">{{ fileName || '—' }}</span>
        </div>
        <div class="mx-meta__row">
          <span class="mx-meta__label">Path</span>
          <span class="mx-meta__value mono" [title]="filePath">{{ filePath || '—' }}</span>
        </div>
      </div>

      <div class="mx-toolbar" *ngIf="xmlContent">
        <span class="mx-toolbar__title">Contenu XML</span>
        <div class="mx-toolbar__actions">
          <button class="btn btn--sm mx-btn mx-btn--primary" (click)="copyXml()" [disabled]="!xmlContent">
            <span>{{ copySuccess ? 'Copié' : 'Copier' }}</span>
          </button>
          <button class="btn btn--sm mx-btn mx-btn--primary" (click)="downloadAsText()" [disabled]="!xmlContent">
            <span>Télécharger TXT</span>
          </button>
        </div>
      </div>

      <div class="mx-xml-scroll" *ngIf="xmlContent">
        <pre class="mx-box">{{ xmlContent }}</pre>
      </div>
    </div>
  </div>
</div>
