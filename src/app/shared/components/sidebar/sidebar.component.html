<aside class="sidebar">

  <!-- Logo Bank of Africa BMCE Group -->
  <div class="sb-logo">
    <img class="sb-logo__img" src="logo-bmce.png" alt="Bank of Africa BMCE Group" />
  </div>

  <!-- Navigation -->
  <nav class="sb-scroll">
    <div class="sb-section" *ngFor="let section of navSections; let last = last">
      <div class="sb-section-label">{{ section.label }}</div>

      <a *ngFor="let item of section.items"
        class="sb-item"
        [routerLink]="item.route"
        routerLinkActive="active">

        <svg class="sb-item__icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <ng-container [ngSwitch]="item.icon">
            <ng-container *ngSwitchCase="'search'">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </ng-container>
            <ng-container *ngSwitchCase="'file-text'">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </ng-container>
            <ng-container *ngSwitchCase="'mail'">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 9l10 6 10-6"/>
            </ng-container>
            <ng-container *ngSwitchCase="'clock'">
              <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
            </ng-container>
            <ng-container *ngSwitchCase="'bar-chart'">
              <rect x="2" y="12" width="4" height="8" rx="1"/><rect x="9" y="8" width="4" height="12" rx="1"/><rect x="16" y="4" width="4" height="16" rx="1"/>
            </ng-container>
            <ng-container *ngSwitchCase="'trending-up'">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
            </ng-container>
            <ng-container *ngSwitchCase="'user-plus'">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="16" y1="11" x2="22" y2="11"/><line x1="19" y1="8" x2="19" y2="14"/>
            </ng-container>
            <ng-container *ngSwitchCase="'lock'">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </ng-container>
            <ng-container *ngSwitchCase="'users'">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
            </ng-container>
            <ng-container *ngSwitchDefault>
              <circle cx="12" cy="7" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/>
            </ng-container>
          </ng-container>
        </svg>

        <span class="sb-item__label">{{ item.label }}</span>
        <span *ngIf="item.badge" class="sb-item__badge">{{ item.badge }}</span>
      </a>

      <div class="sb-sep" *ngIf="!last" style="display:none"></div>
    </div>
  </nav>

  <!-- Footer utilisateur -->
  <div class="sb-footer">
    <div class="sb-footer__user">
      <div class="sb-footer__avatar">AM</div>
      <div>
        <div class="sb-footer__name">Admin BMCE</div>
        <div class="sb-footer__role">Super Administrateur</div>
      </div>
    </div>
  </div>

</aside>
