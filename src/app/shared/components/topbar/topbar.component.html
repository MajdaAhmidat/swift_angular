<header class="topbar">
  <div class="topbar__left">
    <div>
      <div class="topbar__title">{{ pageTitle }}</div>
      <div class="topbar__breadcrumb" *ngIf="breadcrumb">{{ breadcrumb }}</div>
    </div>
  </div>
  <div class="topbar__right">
    <button *ngIf="secondaryLabel" class="btn btn--ghost btn--sm topbar-btn--secondary" (click)="secondaryClick.emit()">
      <ng-container [ngSwitch]="getIcon(secondaryLabel, 'download')">
        <svg *ngSwitchCase="'download'" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        <svg *ngSwitchCase="'search'" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M21 21l-3.9-3.9"></path>
        </svg>
        <svg *ngSwitchCase="'save'" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <path d="M17 21v-8H7v8"></path>
          <path d="M7 3v5h8"></path>
        </svg>
      </ng-container>
      {{ secondaryLabel }}
    </button>
    <button *ngIf="primaryLabel" class="btn btn--teal btn--sm" (click)="primaryClick.emit()">
      <ng-container [ngSwitch]="getIcon(primaryLabel, 'plus')">
        <svg *ngSwitchCase="'reset'" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path d="M3 12a9 9 0 109-9H3"></path>
          <path d="M3 3v6h6"></path>
        </svg>
        <svg *ngSwitchCase="'save'" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <path d="M17 21v-8H7v8"></path>
          <path d="M7 3v5h8"></path>
        </svg>
        <svg *ngSwitchCase="'search'" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M21 21l-3.9-3.9"></path>
        </svg>
        <svg *ngSwitchDefault width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path d="M12 4v16m8-8H4"></path>
        </svg>
      </ng-container>
      {{ primaryLabel }}
    </button>
  </div>
</header>
