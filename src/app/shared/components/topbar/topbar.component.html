<header class="topbar">
  <div class="topbar__left">
    <div>
      <div class="topbar__title">{{ pageTitle }}</div>
      <div class="topbar__breadcrumb" *ngIf="breadcrumb">{{ breadcrumb }}</div>
    </div>
  </div>
  <div class="topbar__right">
    <div class="topbar-notif">
      <div class="topbar-notif__dot"></div>
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
    </div>
    <button *ngIf="secondaryLabel" class="btn btn--ghost btn--sm topbar-btn--secondary">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
      </svg>
      {{ secondaryLabel }}
    </button>
    <button *ngIf="primaryLabel" class="btn btn--teal btn--sm">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path d="M12 4v16m8-8H4"/>
      </svg>
      {{ primaryLabel }}
    </button>
  </div>
</header>
